<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptsCrate | AI Image Library</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">PromptsCrate</div>
            <nav class="nav-links">
                <a href="javascript:void(0)" id="exploreLink" class="nav-box">Explore</a>
                <a href="javascript:void(0)" class="nav-box coming-soon">Trending</a>
                <a href="javascript:void(0)" class="nav-box coming-soon">Submit</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero-container">
            <div class="hero-rectangle animate-hero-fast">
                <h1>Browse AI Image Prompts</h1>
                <p>The ultimate repository for high-fidelity generative AI strings.</p>
                
                <div class="search-glow-container">
                    <div class="search-wrapper">
                        <input type="text" id="searchInput" placeholder="Search prompts...">
                        <button id="searchBtn">Search</button>
                    </div>
                </div>

                <div class="filter-container" id="filterContainer">
                    <button class="filter-btn" data-filter="Personal">Personal</button>
                    <button class="filter-btn" data-filter="Business">Business</button>
                    <button class="filter-btn" data-filter="Event">Event</button>
                </div>
            </div>
        </section>

        <section class="grid-section" id="cards-section">
            <div class="container">
                <div class="prompt-grid" id="promptGrid"></div>
                <div id="noResults" style="display:none; text-align:center; padding: 50px 20px; color: #a0a0a0;">
                    <p>No crates found matching your selection.</p>
                </div>
            </div>
        </section>
    </main>

    <div id="promptModal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn">&times;</span>
            <h2 id="modalTitle">Prompt Details</h2>
            <div id="modalContentArea"></div>
        </div>
    </div>

    <button id="backToTop" title="Go to top">↑</button>

    <footer class="footer">
        <div class="container">
            <div class="logo">PromptsCrate</div>
            <p>© 2026 Professional AI Library.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
